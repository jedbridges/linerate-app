name: Deploy to GitHub Pages

# Builds the static export and publishes it to GitHub Pages on every push to
# main. NEXT_PUBLIC_BASE_PATH must match the repo name so assets resolve under
# the project sub-path (https://<user>.github.io/linerate-app/).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; queue the newest without piling up.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static export
        env:
          NEXT_PUBLIC_BASE_PATH: /linerate-app
        run: npm run build
      - name: Disable Jekyll (serve _next/* verbatim)
        run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
